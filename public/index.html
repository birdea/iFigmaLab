<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>figmalab</title>
</head>

<body>
    <div id="root"></div>
    <script>
    // OAuth callback 처리 — React 로드 전에 빠르게 처리
    (function() {
      if (window.location.pathname !== '/oauth/callback') return;
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      if (!code || !state) return;

      // 방법 1: 팝업 → 부모 창에 postMessage
      if (window.opener) {
        window.opener.postMessage(
          { type: 'figma-oauth-callback', code: code, state: state },
          window.location.origin
        );
        document.getElementById('root').innerHTML =
          '<p style="padding:40px;text-align:center;font-family:sans-serif">인증 완료! 이 창은 자동으로 닫힙니다.</p>';
        setTimeout(function() { window.close(); }, 1000);
        return;
      }

      // 방법 2: 동일 탭 리다이렉트 — localStorage에 code 저장 후 메인으로 이동
      localStorage.setItem('figma_oauth_code', JSON.stringify({ code: code, state: state }));
      document.getElementById('root').innerHTML =
        '<p style="padding:40px;text-align:center;font-family:sans-serif">인증 완료! 메인 페이지로 이동합니다.</p>';
      setTimeout(function() { window.location.href = '/'; }, 1000);
    })();
    </script>
</body>

</html>
